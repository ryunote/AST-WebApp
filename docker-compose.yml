services:
  # --- バックエンド コアサービス ---
  backend:
    build: ./backend
    container_name: stock-core  # 名前を変更し役割を明確化
    ports:
      - "8000:8000"  # フロントエンドからのアクセス用
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/stock_db
      # ML ServiceのURL指定 (サービス名:内部ポート)
      - ML_SERVICE_URL=http://ml-service:8000
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db
      - ml-service

  # --- バックエンド 機械学習サービス ---
  ml-service:
    build: ./backend-ml
    container_name: stock-ml
    ports:
      - "8001:8000"  # ホストの8001番で直接アクセス/デバッグ可能にする
    volumes:
      - ./backend-ml:/app
    # 環境変数は必要に応じて追加 (現在は特になし)
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # --- フロントエンド ---
  # frontend:
  #   # (Next.jsの設定はそのまま。今回は省略せず記述しておきます)
  #   # もしNext.jsをDocker化していない場合は、このセクションは不要または手動起動でOK
  #   # 前回の指示では手動(npm run dev)だったので、ここはコメントアウトでも可
  #   image: node:18-alpine
  #   working_dir: /app
  #   volumes:
  #     - ./frontend:/app
  #   ports:
  #     - "3000:3000"
  #   command: npm run dev

  # --- データベース ---
  db:
    image: postgres:15-alpine
    container_name: stock-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=stock_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: