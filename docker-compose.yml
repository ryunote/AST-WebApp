services:
  # --- バックエンド ---
  backend:
    build: ./backend
    container_name: stock-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    # DB接続情報を環境変数として渡す
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/stock_db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db

  # --- フロントエンド ---
  frontend:
    # image: ... ではなく build を使う
    build: ./frontend
    container_name: stock-frontend
    ports:
      - "3000:3000"
    volumes:
      # ソースコードは同期する
      - ./frontend:/app
      # 【重要】ホストのnode_modulesをコンテナに上書きさせないための設定（匿名ボリューム）
      - /app/node_modules
    environment:
      # ブラウザから見たバックエンドのURL
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  # --- データベース ---
  db:
    image: postgres:15-alpine
    container_name: stock-db
    ports:
      - "5432:5432" # ホストからもアクセス可能にする
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=stock_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: